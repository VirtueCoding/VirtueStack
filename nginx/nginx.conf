# =============================================================================
# VirtueStack Nginx Configuration - Simplified for Development
# =============================================================================

# Worker processes - auto detects number of CPU cores
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    client_max_body_size 100m;

    # Rate limiting zones are defined in conf.d/rate-limit.conf

    # JSON log format (used by conf.d/default.conf)
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"}';

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Upstream servers
    upstream controller {
        server controller:8080;
    }

    upstream admin-webui {
        server admin-webui:3000;
    }

    upstream customer-webui {
        server customer-webui:3001;
    }

    # Server blocks are defined in conf.d/default.conf
    include /etc/nginx/conf.d/*.conf;
}

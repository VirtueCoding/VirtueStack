global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'virtuestack-controller'
    static_configs:
      - targets: ['controller:8080']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'virtuestack-node-agents'
    static_configs:
      - targets: ['node-agent-1:9091']
    metrics_path: '/metrics'
    scrape_interval: 15s

rule_files:
  - 'alerts.yml'

# =============================================================================
# VirtueStack Docker Compose - Main Production Configuration
# =============================================================================
# Usage:
#   Production: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   Development: docker compose up -d (uses override automatically)
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: virtuestack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-virtuestack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-virtuestack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - virtuestack-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-virtuestack} -d ${POSTGRES_DB:-virtuestack}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Port not exposed externally for security

  # ===========================================================================
  # NATS JetStream
  # ===========================================================================
  nats:
    image: nats:2.10-alpine
    container_name: virtuestack-nats
    restart: unless-stopped
    command: ["nats-server", "-js", "-sd", "/data"]
    volumes:
      - nats_data:/data
    networks:
      - virtuestack-internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Port not exposed externally for security

  # ===========================================================================
  # Go Controller Service
  # ===========================================================================
  controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
      args:
        GO_VERSION: ${GO_VERSION:-1.23}
    image: virtuestack/controller:${CONTROLLER_TAG:-latest}
    container_name: virtuestack-controller
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-virtuestack}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-virtuestack}?sslmode=disable
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LISTEN_ADDR: :8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - virtuestack-internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================================================
  # Admin WebUI (Next.js)
  # ===========================================================================
  admin-webui:
    build:
      context: .
      dockerfile: Dockerfile.admin-webui
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    image: virtuestack/admin-webui:${ADMIN_WEBUI_TAG:-latest}
    container_name: virtuestack-admin-webui
    restart: unless-stopped
    depends_on:
      controller:
        condition: service_healthy
    networks:
      - virtuestack-internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ===========================================================================
  # Customer WebUI (Next.js)
  # ===========================================================================
  customer-webui:
    build:
      context: .
      dockerfile: Dockerfile.customer-webui
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    image: virtuestack/customer-webui:${CUSTOMER_WEBUI_TAG:-latest}
    container_name: virtuestack-customer-webui
    restart: unless-stopped
    depends_on:
      controller:
        condition: service_healthy
    networks:
      - virtuestack-internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ===========================================================================
  # Nginx Reverse Proxy
  # ===========================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: virtuestack-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ${SSL_CERT_PATH:-./ssl/cert.pem}:/etc/nginx/ssl/cert.pem:ro
      - ${SSL_KEY_PATH:-./ssl/key.pem}:/etc/nginx/ssl/key.pem:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      controller:
        condition: service_healthy
      admin-webui:
        condition: service_healthy
      customer-webui:
        condition: service_healthy
    networks:
      - virtuestack-internal
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# =============================================================================
# Networks
# =============================================================================
networks:
  virtuestack-internal:
    driver: bridge
    name: virtuestack-network
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: virtuestack-postgres-data
  nats_data:
    name: virtuestack-nats-data
  nginx_cache:
    name: virtuestack-nginx-cache
  nginx_logs:
    name: virtuestack-nginx-logs
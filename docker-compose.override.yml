# =============================================================================
# VirtueStack Docker Compose - Development Overrides
# =============================================================================
# Usage: docker compose up -d (automatically applies this file)
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL - Development Settings
  # ===========================================================================
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-virtuestack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-virtuestack}

  # ===========================================================================
  # NATS JetStream - Development Settings
  # ===========================================================================
  nats:
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_HTTP_PORT:-8222}:8222"
    command: >
      --jetstream
      --store_dir /data
      --http_port 8222
      --cluster_name virtuestack-dev
      --max_memory_store 512MB
      --max_file_store 1GB
      --debug
      --trace

  # ===========================================================================
  # Controller - Development Settings
  # ===========================================================================
  controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
      args:
        GO_VERSION: ${GO_VERSION:-1.23}
      target: development
    volumes:
      - .:/app:cached
      - go_mod_cache:/go/pkg/mod
    ports:
      - "${CONTROLLER_PORT:-8080}:8080"
      - "${DELVE_PORT:-40000}:40000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-virtuestack}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-virtuestack}?sslmode=disable
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-min-32-characters-long}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      LISTEN_ADDR: :8080
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      CGO_ENABLED: "0"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  # ===========================================================================
  # Admin WebUI - Development Settings
  # ===========================================================================
  admin-webui:
    build:
      context: .
      dockerfile: Dockerfile.admin-webui
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
      target: development
    volumes:
      - ./webui/admin:/app:cached
      - admin_node_modules:/app/node_modules
      - admin_next_cache:/app/.next
    ports:
      - "${ADMIN_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
      WATCHPACK_POLLING: "true"
    command: npm run dev
    depends_on:
      controller:
        condition: service_healthy

  # ===========================================================================
  # Customer WebUI - Development Settings
  # ===========================================================================
  customer-webui:
    build:
      context: .
      dockerfile: Dockerfile.customer-webui
      args:
        NODE_VERSION: ${NODE_VERSION:-20}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
      target: development
    volumes:
      - ./webui/customer:/app:cached
      - customer_node_modules:/app/node_modules
      - customer_next_cache:/app/.next
    ports:
      - "${CUSTOMER_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
      WATCHPACK_POLLING: "true"
    command: npm run dev
    depends_on:
      controller:
        condition: service_healthy

  # ===========================================================================
  # Nginx - Development Settings
  # ===========================================================================
  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    environment:
      - TZ=UTC

# =============================================================================
# Additional Development Volumes
# =============================================================================
volumes:
  go_mod_cache:
    name: virtuestack-go-mod-cache
  admin_node_modules:
    name: virtuestack-admin-node-modules
  admin_next_cache:
    name: virtuestack-admin-next-cache
  customer_node_modules:
    name: virtuestack-customer-node-modules
  customer_next_cache:
    name: virtuestack-customer-next-cache
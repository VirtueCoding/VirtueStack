# =============================================================================
# VirtueStack E2E Tests GitHub Actions Workflow
# =============================================================================
# Runs E2E tests against the Docker stack on every push/PR to main.
# Uses Playwright with multiple browsers.
# =============================================================================

name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'webui/**'
      - 'internal/controller/api/**'
      - 'tests/e2e/**'
      - 'docker-compose*.yml'
      - 'Dockerfile.*'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'webui/**'
      - 'internal/controller/api/**'
      - 'tests/e2e/**'
      - 'docker-compose*.yml'
      - 'Dockerfile.*'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:
    inputs:
      browsers:
        description: 'Browsers to test (comma-separated)'
        required: false
        default: 'chromium'
        type: string

env:
  # Test secrets (NOT for production)
  POSTGRES_PASSWORD: virtuestack_test_password
  JWT_SECRET: test_jwt_secret_for_e2e_testing_minimum_32_chars
  ENCRYPTION_KEY: test_encryption_key_32_bytes_test
  NATS_AUTH_TOKEN: virtuestack_nats_test_token

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: virtuestack
          POSTGRES_PASSWORD: virtuestack_test_password
          POSTGRES_DB: virtuestack
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      nats:
        image: nats:2.12-alpine
        ports:
          - 4222:4222
        options: >-
          --health-cmd "wget --spider -q http://localhost:8222/healthz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: |
          cd tests/e2e
          pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: |
          cd tests/e2e
          pnpm exec playwright install --with-deps ${{ inputs.browsers || 'chromium' }}

      - name: Generate test secrets
        run: |
          # Create .env file for docker-compose
          cat > .env << EOF
          POSTGRES_USER=virtuestack
          POSTGRES_PASSWORD=virtuestack_test_password
          POSTGRES_DB=virtuestack
          NATS_AUTH_TOKEN=virtuestack_nats_test_token
          JWT_SECRET=test_jwt_secret_for_e2e_testing_minimum_32_chars
          ENCRYPTION_KEY=test_encryption_key_32_bytes_test
          LOG_LEVEL=debug
          NEXT_PUBLIC_API_URL=/api/v1
          EOF

      - name: Generate SSL certificates
        run: |
          mkdir -p ssl
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout ssl/key.pem \
            -out ssl/cert.pem \
            -subj "/C=US/ST=Test/L=Test/O=VirtueStack/OU=Testing/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,DNS:*.localhost,IP:127.0.0.1"

      - name: Build Controller
        run: |
          go build -o bin/controller ./cmd/controller

      - name: Run database migrations
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path migrations -database "postgresql://virtuestack:virtuestack_test_password@localhost:5432/virtuestack?sslmode=disable" up

      - name: Seed test data
        run: |
          # Create and run seed data
          ./scripts/setup-e2e.sh --seed-only || true
          psql "postgresql://virtuestack:virtuestack_test_password@localhost:5432/virtuestack" < migrations/test_seed.sql || true
        continue-on-error: true

      - name: Build WebUIs
        run: |
          cd webui/admin && npm ci && npm run build
          cd ../customer && npm ci && npm run build

      - name: Start Controller
        run: |
          DATABASE_URL="postgresql://virtuestack:virtuestack_test_password@localhost:5432/virtuestack?sslmode=disable" \
          NATS_URL="nats://virtuestack_nats_test_token@localhost:4222" \
          JWT_SECRET="test_jwt_secret_for_e2e_testing_minimum_32_chars" \
          ENCRYPTION_KEY="test_encryption_key_32_bytes_test" \
          LISTEN_ADDR=":8080" \
          LOG_LEVEL="debug" \
          ./bin/controller &
          echo "Controller started"
          sleep 5

      - name: Start Admin WebUI
        run: |
          cd webui/admin
          PORT=3000 npm run start &
          echo "Admin WebUI started"
          sleep 5

      - name: Start Customer WebUI
        run: |
          cd webui/customer
          PORT=3001 npm run start &
          echo "Customer WebUI started"
          sleep 5

      - name: Wait for services
        run: |
          echo "Waiting for services to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Controller is healthy"
              break
            fi
            sleep 1
          done
          for i in {1..30}; do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Admin WebUI is healthy"
              break
            fi
            sleep 1
          done
          for i in {1..30}; do
            if curl -sf http://localhost:3001 > /dev/null 2>&1; then
              echo "Customer WebUI is healthy"
              break
            fi
            sleep 1
          done

      - name: Run E2E tests
        run: |
          cd tests/e2e
          pnpm exec playwright test --project=${{ inputs.browsers || 'chromium' }}
        env:
          ADMIN_URL: http://localhost:3000
          CUSTOMER_URL: http://localhost:3001
          BASE_URL: http://localhost:8080
          # Test credentials
          TEST_ADMIN_EMAIL: admin@test.virtuestack.local
          TEST_ADMIN_PASSWORD: AdminTest123!
          TEST_CUSTOMER_EMAIL: customer@test.virtuestack.local
          TEST_CUSTOMER_PASSWORD: CustomerTest123!

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-artifacts
          path: |
            tests/e2e/test-results/
            tests/e2e/artifacts/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          pkill -f "bin/controller" || true
          pkill -f "next start" || true

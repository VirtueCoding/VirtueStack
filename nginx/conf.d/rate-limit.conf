# =============================================================================
# VirtueStack Nginx Configuration - Rate Limiting Zones
# =============================================================================
# Define rate limiting zones for different endpoints
# These zones are referenced in the server blocks
# =============================================================================

# -----------------------------------------------------------------------------
# Rate Limiting Zones
# -----------------------------------------------------------------------------
# Syntax: limit_req_zone $key zone=name:size rate=rate;

# General API rate limit: 1000 requests per minute (~16.67 req/s)
# Used for general API endpoints
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=16r/s;

# Customer portal rate limit: 100 requests per minute (~1.67 req/s)
# Stricter rate for customer-facing pages
limit_req_zone $binary_remote_addr zone=customer_limit:10m rate=2r/s;

# Admin portal rate limit: 500 requests per minute (~8.33 req/s)
# Moderate rate for admin operations
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=8r/s;

# Login rate limit: 5 requests per 15 minutes
# Very strict rate to prevent brute force attacks
# Uses 15 minute window with burst allowance
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# Provisioning rate limit: 1000 requests per minute
# For VM provisioning and similar operations
limit_req_zone $binary_remote_addr zone=provisioning_limit:10m rate=16r/s;

# -----------------------------------------------------------------------------
# Connection Limiting Zones
# -----------------------------------------------------------------------------
# Limit concurrent connections from a single IP

# General connection limit
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# -----------------------------------------------------------------------------
# Rate Limit Status Codes
# -----------------------------------------------------------------------------
# Return 429 Too Many Requests instead of default 503
limit_req_status 429;
limit_conn_status 429;

# -----------------------------------------------------------------------------
# Rate Limit Logging
# -----------------------------------------------------------------------------
# Log delayed requests (useful for debugging)
# limit_req_log_level warn;

# -----------------------------------------------------------------------------
# Custom Error Page for Rate Limiting

run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - bodyclose
    - contextcheck
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - forcetypeassert
    - gocritic
    - gosec
    - misspell
    - nilerr
    - noctx
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - unparam
    - wastedassign
    - funlen
    - nestif

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
      - name: var-naming
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: increment-decrement
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: empty-block

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

  gosec:
    excludes:
      - G104  # We use errcheck separately

  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true

  exhaustive:
    default-signifies-exhaustive: true

  funlen:
    lines: 40
    statements: 40

  nestif:
    min-complexity: 3

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - forcetypeassert
    - path: proto/
      linters:
        - all
  max-issues-per-linter: 0
  max-same-issues: 0

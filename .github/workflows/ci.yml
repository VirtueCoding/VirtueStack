name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-lint-test:
    name: Go Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: virtuestack
          POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD }}
          POSTGRES_DB: virtuestack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      nats:
        image: nats:latest
        ports:
          - 4222:4222
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go Vet
        run: go vet ./...

      - name: Go Test
        run: go test -race -count=1 ./...
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NATS_URL: ${{ secrets.NATS_URL }}

  frontend-admin:
    name: Admin Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui/admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webui/admin/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build

  frontend-customer:
    name: Customer Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui/customer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webui/customer/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go-lint-test, frontend-admin, frontend-customer]
    steps:
      - uses: actions/checkout@v4

      - name: Build Controller image
        run: docker build -f Dockerfile.controller -t virtuestack/controller:${{ github.sha }} .

      - name: Build Admin WebUI image
        run: docker build -f Dockerfile.admin-webui -t virtuestack/admin-webui:${{ github.sha }} .

      - name: Build Customer WebUI image
        run: docker build -f Dockerfile.customer-webui -t virtuestack/customer-webui:${{ github.sha }} .

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: NPM Audit (Admin)
        run: cd webui/admin && npm audit --audit-level=high || true

      - name: NPM Audit (Customer)
        run: cd webui/customer && npm audit --audit-level=high || true

# =============================================================================
# VirtueStack E2E Tests GitHub Actions Workflow
# =============================================================================
# Runs E2E tests against the Docker stack on every push/PR to main.
# Uses Playwright with multiple browsers.
# =============================================================================

name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'webui/**'
      - 'internal/controller/api/**'
      - 'tests/e2e/**'
      - 'docker-compose*.yml'
      - 'Dockerfile.*'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'webui/**'
      - 'internal/controller/api/**'
      - 'tests/e2e/**'
      - 'docker-compose*.yml'
      - 'Dockerfile.*'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:
    inputs:
      project_group:
        description: 'Browser family to run across admin, customer, and auth projects'
        required: false
        default: 'chromium'
        type: string

env:
  # Test secrets (NOT for production)
  POSTGRES_PASSWORD: virtuestack_test_password
  JWT_SECRET: test_jwt_secret_for_e2e_testing_minimum_32_chars
  ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  NATS_AUTH_TOKEN: virtuestack_nats_test_token
  GUEST_OP_HMAC_SECRET: test_guest_op_hmac_secret_for_e2e_testing

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: virtuestack
          POSTGRES_PASSWORD: virtuestack_test_password
          POSTGRES_DB: virtuestack
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: |
          cd tests/e2e
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Playwright browsers
        run: |
          cd tests/e2e
          pnpm exec playwright install --with-deps ${{ inputs.project_group || 'chromium' }}

      - name: Generate test secrets
        run: |
          cat > .env.test << EOF
          POSTGRES_USER=virtuestack
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=virtuestack
          NATS_AUTH_TOKEN=${NATS_AUTH_TOKEN}
          JWT_SECRET=${JWT_SECRET}
          ENCRYPTION_KEY=${ENCRYPTION_KEY}
          GUEST_OP_HMAC_SECRET=${GUEST_OP_HMAC_SECRET}
          TEST_ADMIN_EMAIL=admin@test.virtuestack.local
          TEST_ADMIN_2FA_EMAIL=2fa-admin@test.virtuestack.local
          TEST_ADMIN_PASSWORD=AdminTest123!
          TEST_ADMIN_TOTP_SECRET=JBSWY3DPEHPK3PXP
          TEST_CUSTOMER_EMAIL=customer@test.virtuestack.local
          TEST_CUSTOMER_2FA_EMAIL=2fa-customer@test.virtuestack.local
          TEST_CUSTOMER_PASSWORD=CustomerTest123!
          TEST_CUSTOMER_TOTP_SECRET=KRSXG5DSN5XW4ZLP
          LOG_LEVEL=debug
          NEXT_PUBLIC_API_URL=/api/v1
          EOF

      - name: Start NATS
        run: |
          docker run -d --name virtuestack-e2e-nats \
            -p 4222:4222 \
            -p 8222:8222 \
            nats:2.12-alpine \
            nats-server -js -sd /data --auth "${NATS_AUTH_TOKEN}" -m 8222

      - name: Generate SSL certificates
        run: |
          mkdir -p ssl
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout ssl/key.pem \
            -out ssl/cert.pem \
            -subj "/C=US/ST=Test/L=Test/O=VirtueStack/OU=Testing/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,DNS:*.localhost,IP:127.0.0.1"

      - name: Build Controller
        run: |
          go build -o bin/controller ./cmd/controller

      - name: Run database migrations
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.1
          migrate -path migrations -database "postgresql://virtuestack:virtuestack_test_password@localhost:5432/virtuestack?sslmode=disable" up

      - name: Seed test data
        run: |
          ./scripts/setup-e2e.sh --seed-only

      - name: Build WebUIs
        run: |
          cd webui/admin && npm ci && npm run build
          cd ../customer && npm ci && npm run build

      - name: Start Controller
        run: |
          DATABASE_URL="postgresql://virtuestack:${POSTGRES_PASSWORD}@localhost:5432/virtuestack?sslmode=disable" \
          NATS_URL="nats://${NATS_AUTH_TOKEN}@localhost:4222" \
          JWT_SECRET="${JWT_SECRET}" \
          ENCRYPTION_KEY="${ENCRYPTION_KEY}" \
          GUEST_OP_HMAC_SECRET="${GUEST_OP_HMAC_SECRET}" \
          LISTEN_ADDR=":8080" \
          LOG_LEVEL="debug" \
          ./bin/controller &
          echo $! > /tmp/controller.pid
          echo "Controller started"
          sleep 5

      - name: Start Admin WebUI
        run: |
          cd webui/admin
          PORT=3000 npm run start &
          echo $! > /tmp/admin-webui.pid
          echo "Admin WebUI started"
          sleep 5

      - name: Start Customer WebUI
        run: |
          cd webui/customer
          PORT=3001 npm run start &
          echo $! > /tmp/customer-webui.pid
          echo "Customer WebUI started"
          sleep 5

      - name: Wait for services
        run: |
          wait_for_url() {
            local name="$1"
            local url="$2"
            local attempts="$3"

            for _ in $(seq 1 "${attempts}"); do
              if curl -sf "${url}" > /dev/null 2>&1; then
                echo "${name} is healthy"
                return 0
              fi
              sleep 1
            done

            echo "timed out waiting for ${name} at ${url}" >&2
            return 1
          }

          wait_for_url "controller" "http://localhost:8080/health" 30
          wait_for_url "admin webui" "http://localhost:3000" 30
          wait_for_url "customer webui" "http://localhost:3001" 30

      - name: Run E2E tests
        run: |
          cd tests/e2e
          pnpm exec playwright test --project=admin-${{ inputs.project_group || 'chromium' }} --project=customer-${{ inputs.project_group || 'chromium' }} --project=auth-${{ inputs.project_group || 'chromium' }}
        env:
          ADMIN_URL: http://localhost:3000
          CUSTOMER_URL: http://localhost:3001
          BASE_URL: http://localhost:8080
          # Test credentials
          TEST_ADMIN_EMAIL: admin@test.virtuestack.local
          TEST_ADMIN_PASSWORD: AdminTest123!
          TEST_ADMIN_2FA_EMAIL: 2fa-admin@test.virtuestack.local
          TEST_ADMIN_TOTP_SECRET: JBSWY3DPEHPK3PXP
          TEST_CUSTOMER_EMAIL: customer@test.virtuestack.local
          TEST_CUSTOMER_PASSWORD: CustomerTest123!
          TEST_CUSTOMER_2FA_EMAIL: 2fa-customer@test.virtuestack.local
          TEST_CUSTOMER_TOTP_SECRET: KRSXG5DSN5XW4ZLP

      - name: Upload Playwright report
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        if: failure()
        with:
          name: test-artifacts
          path: |
            tests/e2e/test-results/
            tests/e2e/artifacts/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          for pid_file in /tmp/controller.pid /tmp/admin-webui.pid /tmp/customer-webui.pid; do
            if [ -f "${pid_file}" ]; then
              pid="$(cat "${pid_file}")"
              if [ -n "${pid}" ] && kill -0 "${pid}" > /dev/null 2>&1; then
                kill "${pid}" || true
                wait "${pid}" 2>/dev/null || true
              fi
            fi
          done
          docker rm -f virtuestack-e2e-nats || true

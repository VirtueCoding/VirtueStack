# =============================================================================
# VirtueStack Docker Compose - Main Production Configuration
# =============================================================================
# Usage:
#   Production: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   Development: docker compose up -d (uses override automatically)
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  # QG-19: Postgres official image runs as non-root 'postgres' user (UID 70)
  # by default. Explicit user directive not required for this image.
  postgres:
    image: postgres:18-alpine
    container_name: virtuestack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-virtuestack}
      # SECURITY: POSTGRES_PASSWORD must be set in .env - no default fallback.
      # Failing to set this will cause the service to fail to start.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-virtuestack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - virtuestack-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-virtuestack} -d ${POSTGRES_DB:-virtuestack}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    # Port not exposed externally for security

  # ===========================================================================
  # NATS JetStream
  # ===========================================================================
  # QG-19: NATS official image runs as non-root 'nats' user (UID 100)
  # by default. Explicit user directive not required for this image.
  nats:
    image: nats:2.12-alpine
    container_name: virtuestack-nats
    restart: unless-stopped
    # SECURITY: NATS_AUTH_TOKEN must be set in .env - no default fallback.
    # Failing to set this will cause the service to fail to start.
    command: ["nats-server", "-js", "-sd", "/data", "--auth", "${NATS_AUTH_TOKEN:?NATS_AUTH_TOKEN must be set in .env}"]
    volumes:
      - nats_data:/data
    networks:
      - virtuestack-internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    # Port not exposed externally for security

  # ===========================================================================
  # Go Controller Service
  # ===========================================================================
  controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
      args:
        GO_VERSION: ${GO_VERSION:-1.26}
    image: virtuestack/controller:${CONTROLLER_TAG:-v2.1.0}
    container_name: virtuestack-controller
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-virtuestack}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-virtuestack}?sslmode=prefer
      # SECURITY: NATS_AUTH_TOKEN must be set in .env - no default fallback.
      NATS_URL: nats://${NATS_AUTH_TOKEN:?NATS_AUTH_TOKEN must be set in .env}@nats:4222
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GUEST_OP_HMAC_SECRET: ${GUEST_OP_HMAC_SECRET:?GUEST_OP_HMAC_SECRET must be set in .env}
      LISTEN_ADDR: :8080
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-172.20.0.0/24}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - virtuestack-internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ===========================================================================
  # Admin WebUI (Next.js)
  # ===========================================================================
  admin-webui:
    build:
      context: .
      dockerfile: Dockerfile.admin-webui
      args:
        NODE_VERSION: ${NODE_VERSION:-24}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    image: virtuestack/admin-webui:${ADMIN_WEBUI_TAG:-v2.1.0}
    container_name: virtuestack-admin-webui
    restart: unless-stopped
    depends_on:
      controller:
        condition: service_healthy
    networks:
      - virtuestack-internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ===========================================================================
  # Customer WebUI (Next.js)
  # ===========================================================================
  customer-webui:
    build:
      context: .
      dockerfile: Dockerfile.customer-webui
      args:
        NODE_VERSION: ${NODE_VERSION:-24}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    image: virtuestack/customer-webui:${CUSTOMER_WEBUI_TAG:-v2.1.0}
    container_name: virtuestack-customer-webui
    restart: unless-stopped
    depends_on:
      controller:
        condition: service_healthy
    networks:
      - virtuestack-internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ===========================================================================
  # Nginx Reverse Proxy
  # ===========================================================================
  nginx:
    image: nginx:1.28-alpine
    container_name: virtuestack-nginx
    restart: unless-stopped
    user: "101:101"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ${SSL_CERT_PATH:-./ssl/cert.pem}:/etc/nginx/ssl/cert.pem:ro
      - ${SSL_KEY_PATH:-./ssl/key.pem}:/etc/nginx/ssl/key.pem:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      controller:
        condition: service_healthy
      admin-webui:
        condition: service_healthy
      customer-webui:
        condition: service_healthy
    networks:
      - virtuestack-internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

# =============================================================================
# Networks
# =============================================================================
networks:
  virtuestack-internal:
    driver: bridge
    name: virtuestack-network
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
    ipam:
      driver: default
      config:
        - subnet: ${DOCKER_NETWORK_SUBNET:-172.20.0.0/24}

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: virtuestack-postgres-data
  nats_data:
    name: virtuestack-nats-data
  nginx_cache:
    name: virtuestack-nginx-cache
  nginx_logs:
    name: virtuestack-nginx-logs

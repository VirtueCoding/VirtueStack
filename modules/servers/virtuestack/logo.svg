<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded rectangle background -->
  <rect width="128" height="128" rx="16" fill="url(#bgGradient)"/>
  
  <!-- Stack layers representing virtualization -->
  <g transform="translate(16, 24)">
    <!-- Bottom layer (hardware/node) -->
    <rect x="0" y="64" width="96" height="16" rx="2" fill="#0f3460"/>
    <rect x="4" y="68" width="12" height="8" rx="1" fill="#00d9ff" opacity="0.8"/>
    <rect x="20" y="68" width="12" height="8" rx="1" fill="#00d9ff" opacity="0.8"/>
    <rect x="36" y="68" width="24" height="8" rx="1" fill="#00d9ff" opacity="0.5"/>
    
    <!-- Middle layer (hypervisor) -->
    <rect x="0" y="44" width="96" height="16" rx="2" fill="#1a3a5c"/>
    <rect x="4" y="48" width="40" height="8" rx="1" fill="#e94560" opacity="0.7"/>
    <rect x="48" y="48" width="44" height="8" rx="1" fill="#e94560" opacity="0.5"/>
    
    <!-- Top layer (VMs) -->
    <rect x="0" y="24" width="28" height="16" rx="2" fill="url(#accentGradient)"/>
    <rect x="34" y="24" width="28" height="16" rx="2" fill="url(#accentGradient)"/>
    <rect x="68" y="24" width="28" height="16" rx="2" fill="url(#accentGradient)"/>
    
    <!-- VM icons -->
    <rect x="8" y="30" width="12" height="4" rx="1" fill="#fff" opacity="0.9"/>
    <rect x="42" y="30" width="12" height="4" rx="1" fill="#fff" opacity="0.9"/>
    <rect x="76" y="30" width="12" height="4" rx="1" fill="#fff" opacity="0.9"/>
    
    <!-- Cloud/network symbol -->
    <circle cx="48" cy="8" r="8" fill="none" stroke="#00d9ff" stroke-width="2"/>
    <circle cx="48" cy="8" r="4" fill="#00d9ff"/>
    <line x1="48" y1="16" x2="48" y2="24" stroke="#00d9ff" stroke-width="2"/>
  </g>
  
  <!-- V letter mark -->
  <text x="64" y="120" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.6">VIRTUESTACK</text>
</svg>
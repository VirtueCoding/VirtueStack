name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-lint-test:
    name: Go Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: virtuestack
          POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD }}
          POSTGRES_DB: virtuestack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      nats:
        image: nats:2.10.25-alpine
        ports:
          - 4222:4222
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Go Vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01f267a5f60b6756a5e4a05adf4 # v6.5.2
        with:
          version: v1.64.8
          args: --timeout=5m

      - name: Go Test
        run: go test -race -count=1 ./...
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NATS_URL: ${{ secrets.NATS_URL }}

  frontend-admin:
    name: Admin Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui/admin
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webui/admin/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build

  frontend-customer:
    name: Customer Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui/customer
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webui/customer/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go-lint-test, frontend-admin, frontend-customer]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build Controller image
        run: docker build -f Dockerfile.controller -t virtuestack/controller:${{ github.sha }} -t virtuestack-controller:latest .

      - name: Scan controller image for vulnerabilities
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.30.0
        with:
          image-ref: 'virtuestack-controller:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Build Admin WebUI image
        run: docker build -f Dockerfile.admin-webui -t virtuestack/admin-webui:${{ github.sha }} -t virtuestack-admin-webui:latest .

      - name: Scan admin-webui image for vulnerabilities
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.30.0
        with:
          image-ref: 'virtuestack-admin-webui:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Build Customer WebUI image
        run: docker build -f Dockerfile.customer-webui -t virtuestack/customer-webui:${{ github.sha }} -t virtuestack-customer-webui:latest .

      - name: Scan customer-webui image for vulnerabilities
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # v0.30.0
        with:
          image-ref: 'virtuestack-customer-webui:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.3
          govulncheck ./...

      - name: NPM Audit (Admin)
        run: cd webui/admin && npm audit --audit-level=high

      - name: NPM Audit (Customer)
        run: cd webui/customer && npm audit --audit-level=high
